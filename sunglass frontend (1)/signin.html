<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — proSPORT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    // Tailwind config — derived from the Aritzia token set (exact values),
    // re-themed for proSPORT. Monochrome + cool-grey ladder, px type scale,
    // radius-0, hairlines. Brand colour lives in the logo only. No custom CSS.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Hanken Grotesk"', 'Helvetica Neue', 'Arial', 'sans-serif'] },
          colors: {
            ink: '#000000',
            paper: '#FFFFFF',
            brand: '#2EA3DC',
            sale: '#2EA3DC',
            grey: {
              950: '#141414', 800: '#333333', 700: '#4A4A4A', 600: '#5E5E5E',
              500: '#6E6E6E', 400: '#8C8C8C', 300: '#C9C9C9', 250: '#D6D6D6',
              200: '#E2E2E2', 150: '#E9E9E9', 100: '#ECECEC', 75: '#F2F2F2', 50: '#F6F6F6'
            }
          },
          fontSize: {
            '2xs': ['11px', '1.4'], 'xs': ['12px', '1.4'], 'sm': ['13px', '1.4'],
            'base': ['15px', '1.55'], 'md': ['16px', '1.55'], 'lg': ['18px', '1.5'],
            'xl': ['21px', '1.3'], '2xl': ['26px', '1.2'], '3xl': ['34px', '1.15'],
            '4xl': ['44px', '1.08'], '5xl': ['56px', '1.05'], '6xl': ['68px', '1.03']
          },
          letterSpacing: { tightish: '-0.01em', wide: '0.04em', wider: '0.10em' },
          maxWidth: { shell: '1680px' },
          boxShadow: { pop: '0 8px 30px rgba(0,0,0,0.12)' },
          transitionTimingFunction: { standard: 'cubic-bezier(0.4,0,0.2,1)' }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-paper text-ink antialiased">

  <div class="lg:grid lg:grid-cols-2 lg:min-h-screen">

    <!-- ============ LEFT — product image ============ -->
    <div class="relative hidden lg:flex items-center justify-center bg-grey-50 overflow-hidden p-20">
      <img src="https://zgcekcoatiskqbdruadg.supabase.co/storage/v1/object/public/bikershades/2022_05_Airspeed-Black-Angle.jpg" alt="proSPORT Airspeed" class="w-full h-full object-contain mix-blend-multiply">
      <a href="index.html" class="absolute top-9 left-10" aria-label="proSPORT home">
        <img src="assets/prosport-logo.png" alt="proSPORT" class="h-9 w-auto">
      </a>
    </div>

    <!-- ============ RIGHT — form ============ -->
    <div class="relative flex flex-col min-h-screen px-6 sm:px-10 lg:px-14 py-6">

      <!-- top bar: back + help -->
      <div class="flex items-center justify-between">
        <button type="button" onclick="history.length > 1 ? history.back() : (location.href='index.html')" class="flex items-center gap-1.5 text-sm hover:opacity-60 transition-opacity duration-200">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </button>
        <a href="#" class="whitespace-nowrap text-sm underline underline-offset-4 hover:opacity-60 transition-opacity duration-200">Need Help?</a>
      </div>

      <!-- centered form -->
      <div class="flex-1 flex flex-col justify-center w-full max-w-[380px] mx-auto py-10">

        <!-- logo on mobile (image panel hidden) -->
        <a href="index.html" class="lg:hidden mb-8" aria-label="proSPORT home">
          <img src="assets/prosport-logo.png" alt="proSPORT" class="h-8 w-auto">
        </a>

        <p class="text-base text-grey-700">Sign in or create an account to enjoy the benefits</p>

        <!-- benefits -->
        <div class="grid grid-cols-4 gap-2 mt-6 mb-7">
          <div class="flex flex-col items-center text-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.2" fill="currentColor" stroke="none"/></svg>
            <span class="text-xs text-grey-600 leading-tight">Private<br>Sales</span>
          </div>
          <div class="flex flex-col items-center text-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4h14v11H1z"/><path d="M15 8h4l4 4v3h-8z"/><circle cx="6" cy="18.5" r="2"/><circle cx="18.5" cy="18.5" r="2"/></svg>
            <span class="text-xs text-grey-600 leading-tight">Free<br>Shipping</span>
          </div>
          <div class="flex flex-col items-center text-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="m9 13 2 2 4-4"/></svg>
            <span class="text-xs text-grey-600 leading-tight">Faster<br>Checkout</span>
          </div>
          <div class="flex flex-col items-center text-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span class="text-xs text-grey-600 leading-tight">Saved<br>Lists</span>
          </div>
        </div>

        <!-- form -->
        <form class="space-y-3" onsubmit="return false">
          <input id="email" type="email" autocomplete="email" placeholder="Email Address" class="w-full border border-grey-300 focus:border-ink transition-colors duration-200 px-4 h-12 text-base outline-none placeholder-grey-400">
          <div class="relative">
            <input id="password" type="password" autocomplete="current-password" placeholder="Password" class="w-full border border-grey-300 focus:border-ink transition-colors duration-200 px-4 pr-16 h-12 text-base outline-none placeholder-grey-400">
            <button type="button" onclick="togglePw(this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-grey-500 hover:text-ink transition-colors duration-200">Show</button>
          </div>
          <button type="submit" class="w-full bg-ink text-paper text-base py-3.5 hover:bg-grey-800 transition-colors duration-200">Sign In</button>
        </form>

        <div class="flex items-center justify-between mt-4">
          <a href="#" class="whitespace-nowrap text-sm underline underline-offset-4 hover:opacity-60 transition-opacity duration-200">Forgot Password?</a>
          <a href="#" class="whitespace-nowrap text-sm underline underline-offset-4 hover:opacity-60 transition-opacity duration-200">Create An Account</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function togglePw(btn) {
      const inp = document.getElementById('password');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }
  </script>

</body>
</html>
